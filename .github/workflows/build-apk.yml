name: ۲) ساخت APK نهایی (نسخه بازار)

# این workflow یک APK امضاشده‌ی release می‌سازد که آماده‌ی انتشار در بازار است.
# پیش‌نیاز: ابتدا workflow «ساخت کلید امضا» را اجرا کن و ۴ Secret را ثبت کن.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد پروژه
        uses: actions/checkout@v4

      - name: نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: نصب Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: نصب ابزار اندروید (SDK)
        uses: android-actions/setup-android@v3

      - name: نصب وابستگی‌های پروژه
        run: npm install

      - name: آفلاین‌کردن اپ (جاسازی کتابخانه‌ها)
        continue-on-error: true
        run: node make-offline.js

      - name: افزودن پلتفرم اندروید
        run: npx cap add android

      - name: همگام‌سازی فایل‌ها
        run: npx cap sync android

      - name: حذف وابستگی اضافی google-services
        run: |
          if [ -f android/build.gradle ]; then
            sed -i "/com.google.gms:google-services/d" android/build.gradle
          fi
          if [ -f android/app/build.gradle ]; then
            node -e "const fs=require('fs');const p='android/app/build.gradle';let s=fs.readFileSync(p,'utf8');s=s.replace(/try\s*\{[^}]*google-services[\s\S]*?\}\s*catch[\s\S]*?\}\s*/g,'');fs.writeFileSync(p,s);console.log('cleaned app/build.gradle');"
          fi

      - name: بازگرداندن کلید امضا از Secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/pacto-release.keystore
          echo "کلید بازگردانده شد"

      - name: تنظیم امضا در build.gradle
        run: |
          node -e "
          const fs = require('fs');
          const p = 'android/app/build.gradle';
          let s = fs.readFileSync(p, 'utf8');
          const signing = \`
              signingConfigs {
                  release {
                      storeFile file('pacto-release.keystore')
                      storePassword System.getenv('KS_PASS')
                      keyAlias System.getenv('KS_ALIAS')
                      keyPassword System.getenv('KS_KEYPASS')
                  }
              }
          \`;
          s = s.replace(/android\s*\{/, 'android {' + signing);
          if (s.match(/buildTypes\s*\{\s*release\s*\{/)) {
            s = s.replace(/(buildTypes\s*\{\s*release\s*\{)/, '\$1\n            signingConfig signingConfigs.release');
          } else {
            s = s.replace(/buildTypes\s*\{/, 'buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }');
          }
          fs.writeFileSync(p, s);
          console.log('signing config added');
          "

      - name: ساخت APK امضاشده (release)
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
          KS_KEYPASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: آپلود فایل APK نهایی (نسخه بازار)
        uses: actions/upload-artifact@v4
        with:
          name: pacto-app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
