name: ۱) ساخت کلید امضا (فقط یک‌بار)

# این workflow را فقط یک‌بار اجرا کن تا کلید امضای اپ ساخته شود.
# خروجی را دانلود کن و طبق راهنما در Secrets ذخیره کن.

on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: ساخت کلید امضا (keystore)
        run: |
          keytool -genkeypair -v \
            -keystore pacto-release.keystore \
            -alias pacto \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pacto12345 -keypass pacto12345 \
            -dname "CN=Pacto, OU=Mobile, O=Adpacto, L=Tehran, S=Tehran, C=IR"
          echo "کلید ساخته شد ✅"

      - name: تبدیل کلید به متن (base64)
        run: |
          base64 -w 0 pacto-release.keystore > keystore-base64.txt
          echo "================ متن کلید (base64) ================"
          echo "این متن طولانی را کامل کپی کن و در Secret با نام KEYSTORE_BASE64 بذار:"
          echo ""
          cat keystore-base64.txt
          echo ""
          echo "=================================================="
          echo "رمزها (برای Secretهای دیگر):"
          echo "KEYSTORE_PASSWORD = pacto12345"
          echo "KEY_ALIAS = pacto"
          echo "KEY_PASSWORD = pacto12345"

      - name: آپلود فایل کلید (برای نگهداری امن)
        uses: actions/upload-artifact@v4
        with:
          name: pacto-keystore-فایل-کلید
          path: |
            pacto-release.keystore
            keystore-base64.txt
