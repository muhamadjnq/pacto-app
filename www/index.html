const API_BASE = "https://adpacto.com/api/v1";
let AUTH_TOKEN = null;
async function api(path, { method = "GET", body, auth = true } = {}) {
  const headers = { "Accept": "application/json" };
  if (body) headers["Content-Type"] = "application/json";
  if (auth && AUTH_TOKEN) headers["Authorization"] = "Bearer " + AUTH_TOKEN;
  const res = await fetch(API_BASE + path, {
    method, headers, body: body ? JSON.stringify(body) : undefined,
  });
  let data = null;
  try { data = await res.json(); } catch (e) { data = null; }
  if (!res.ok) {
    const msg = (data && (data.message || (data.errors && Object.values(data.errors)[0][0]))) || "خطا در ارتباط با سرور";
    throw new Error(msg);
  }
  return data;
}

      <Loader2 size={22} color={c.dim} style={{ animation: "spin 1s linear infinite", marginTop: 8 }} />

  );
  const Login = () => {
    const [mode, setMode] = useState("login"); // login | register

        const r = mode === "login"
          ? await api("/login", { method: "POST", auth: false, body: { email: f.email, password: f.password } })
          : await api("/register", { method: "POST", auth: false, body: { name: f.name, email: f.email, phone: f.phone, password: f.password } });
        AUTH_TOKEN = r.token;
        applyUser(r.user);
        setScreen("app");
        loadCatalog();
        loadOrders();
        loadCampaigns();

        setErr(e.message);

      <div className="flex flex-col h-full" style={{ background: c.bg }}>

          <div className="text-center mt-6" style={{ fontSize: 13, color: c.dim }}>
            {mode === "login" ? "حساب ندارید؟ " : "حساب دارید؟ "}
            <span onClick={() => { setErr(""); setMode(mode === "login" ? "register" : "login"); }} style={{ color: c.primary, fontWeight: 700 }}>{mode === "login" ? "ثبت‌نام" : "ورود"}</span>
          </div>
        </div>
      </div>
    );
  };

  /* HOME */
  const HomeScreen = () => (
    <div className="pb-28">
      <div className="px-5 pt-4 flex items-center justify-between">
        <div className="flex items-center gap-3"><Logo s={42} /><div><div style={{ fontSize: 12, color: c.dim }}>سلام، خوش اومدی 👋</div><div className="font-bold" style={{ fontSize: 17, color: c.text }}>{profile.name}</div></div></div>
        <button onClick={() => push("notifs")} className="relative flex items-center justify-center rounded-full" style={{ width: 44, height: 44, background: c.card, border: `1px solid ${c.line}` }}><Bell size={20} color={c.text} /><span style={{ position: "absolute", top: 9, right: 11, width: 8, height: 8, borderRadius: 99, background: c.danger }} /></button>
      </div>
      <div className="px-5 mt-4"><Card glow style={{ padding: 20, background: GRAD, border: "none", overflow: "hidden", position: "relative" }}>
        <div style={{ position: "absolute", top: -40, left: -30, width: 140, height: 140, borderRadius: 99, background: "rgba(255,255,255,.14)" }} />
        <div className="flex items-center justify-between" style={{ position: "relative" }}><div><div style={{ fontSize: 13, color: "#ffffffcc", fontWeight: 600 }}>موجودی کیف پول</div><div className="font-bold mt-1" style={{ fontSize: 27, color: "#fff" }}>{money(wallet)} <span style={{ fontSize: 14 }}>تومان</span></div></div><Wallet size={30} color="#fff" /></div>
        <div className="flex gap-2 mt-4" style={{ position: "relative" }}><button onClick={() => push("topup")} className="flex-1 flex items-center justify-center gap-1.5 font-bold" style={{ background: "#fff", color: c.primary, borderRadius: 13, padding: "11px", fontSize: 14, border: "none" }}><Plus size={17} /> شارژ</button><button onClick={() => push("wallet")} className="flex-1 flex items-center justify-center gap-1.5 font-bold" style={{ background: "rgba(255,255,255,.2)", color: "#fff", borderRadius: 13, padding: "11px", fontSize: 14, border: "none" }}>تراکنش‌ها</button></div>
      </Card></div>
      <div className="px-5 mt-5 grid grid-cols-4 gap-3">{[{ i: Rocket, t: "تبلیغ", a: () => { goTab("campaigns"); push("wizard"); } }, { i: ShoppingBag, t: "خدمات", a: () => goTab("shop") }, { i: Sparkles, t: "محتوا", a: () => goTab("ai") }, { i: Headphones, t: "پشتیبانی", a: () => push("tickets") }].map((q, i) => (<button key={i} onClick={q.a} className="flex flex-col items-center gap-2"><div className="flex items-center justify-center" style={{ width: 56, height: 56, borderRadius: 18, background: c.card, border: `1px solid ${c.line}` }}><q.i size={22} color={c.primary} /></div><span style={{ fontSize: 12, color: c.dim, fontWeight: 600 }}>{q.t}</span></button>))}</div>
      <div className="px-5 mt-5 grid grid-cols-3 gap-3">{[{ i: Package, t: "سفارش‌ها", v: fa(orders.length), a: () => push("orders"), col: c.primary }, { i: Rocket, t: "کمپین فعال", v: fa(campaigns.filter(x => x.status === "active").length), a: () => goTab("campaigns"), col: c.success }, { i: Wallet, t: "کیف پول", v: money(wallet), a: () => push("wallet"), col: c.accent }].map((s, i) => (<Card key={i} onClick={s.a} style={{ padding: 14, display: "flex", flexDirection: "column", gap: 6 }}><s.i size={20} color={s.col} /><div className="font-bold" style={{ fontSize: 15, color: c.text }}>{s.v}</div><div style={{ fontSize: 11, color: c.dim }}>{s.t}</div></Card>))}</div>
      <div className="px-5 mt-6 flex items-center justify-between"><div className="font-bold" style={{ fontSize: 16, color: c.text }}>کمپین‌های اخیر</div><span onClick={() => goTab("campaigns")} style={{ fontSize: 13, color: c.primary, fontWeight: 600 }}>همه</span></div>
      <div className="px-5 mt-3 flex flex-col gap-3">{campaigns.length === 0 ? (<Card onClick={() => push("wizard")} style={{ padding: 20, textAlign: "center" }}><Rocket size={30} color={c.primary} style={{ margin: "0 auto 10px" }} /><div className="font-bold" style={{ fontSize: 14, color: c.text }}>هنوز کمپینی نساخته‌اید</div><div style={{ fontSize: 12, color: c.dim, marginTop: 4 }}>برای شروع تبلیغات، اولین کمپین خود را بسازید</div></Card>) : campaigns.slice(0, 5).map((cp) => (<Card key={cp.id} onClick={() => push("campaign", { cp })} style={{ padding: 16 }}>
        <div className="flex items-center justify-between mb-3"><div className="font-bold" style={{ fontSize: 15, color: c.text }}>{cp.name}</div><Badge s={cp.status} /></div>
        {cp.status === "active" ? (<><div className="flex items-center justify-between mb-2" style={{ fontSize: 12, color: c.dim }}><span>پیشرفت کمپین</span><span style={{ color: c.text, fontWeight: 700 }}>{fa(cp.prog)}٪</span></div>
        <div style={{ height: 8, borderRadius: 99, background: c.bg2, overflow: "hidden" }}><div style={{ width: `${cp.prog}%`, height: "100%", borderRadius: 99, background: GRAD }} /></div>
        <div className="flex gap-2 mt-3"><Stat ic={Eye} label="نمایش" val={money(cp.imp)} color={c.primary2} /><Stat ic={MousePointerClick} label="کلیک" val={money(cp.clk)} color={c.primary} /><Stat ic={Target} label="تبدیل" val={money(cp.conv)} color={c.accent} /></div></>) : (<div className="flex items-center justify-between" style={{ fontSize: 13, color: c.dim }}><span>بودجه: {money(cp.budget)} تومان</span><ChevronLeft size={18} color={c.dim} /></div>)}
      </Card>))}</div>
    </div>
  );

  /* SHOP */
  const GRADS = [["#f59e0b","#ef4444"],["#06b6d4","#3b82f6"],["#7367f0","#8b5cf6"],["#22c55e","#10b981"],["#f43f5e","#ec4899"],["#0a66c2","#3b82f6"]];
  const gradFor = (i) => GRADS[i % GRADS.length];
  const CAT_ICONS = [Instagram, Send, Youtube, Globe, Search, Film, Music2, Megaphone, FileText, Tag];
  const Shop = () => {
    const [q, setQ] = useState(""); const [catId, setCatId] = useState(null);
    const products = apiProducts || [];
    const cats = apiCategories || [];
    const list = products.filter((p) => (catId === null || (p.catIds || []).includes(catId)) && p.name.includes(q));
    return (
      <div className="pb-28">
        <div className="px-5 pt-4 flex items-center justify-between"><div className="font-bold" style={{ fontSize: 22, color: c.text }}>خدمات مارکتینگ</div><button onClick={loadCatalog} style={{ fontSize: 12, color: c.primary, fontWeight: 700, background: "none", border: "none" }}>بروزرسانی</button></div>
        <div className="px-5 mt-4"><div className="flex items-center gap-2 rounded-2xl px-4" style={{ background: c.card, border: `1px solid ${c.line}`, height: 50 }}><Search size={19} color={c.dim} /><input value={q} onChange={(e) => setQ(e.target.value)} placeholder="جستجوی خدمات…" style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: c.text, fontSize: 15, fontFamily: "inherit" }} /></div></div>
        {cats.length > 0 && <div className="flex gap-3 px-5 mt-4 overflow-x-auto pb-1" style={{ scrollbarWidth: "none" }}>
          <button onClick={() => setCatId(null)} className="flex flex-col items-center gap-2" style={{ flexShrink: 0, width: 72 }}><div style={{ width: 60, height: 60, borderRadius: 18, background: catId === null ? GRAD : c.card, border: `1px solid ${catId === null ? "transparent" : c.line}`, display: "flex", alignItems: "center", justifyContent: "center" }}><ShoppingBag size={24} color={catId === null ? "#fff" : c.primary} /></div><span style={{ fontSize: 11, color: catId === null ? c.primary : c.dim, fontWeight: 700, whiteSpace: "nowrap" }}>همه</span></button>
          {cats.map((k, i) => { const g = gradFor(i); const active = catId === k.id; const Ic = CAT_ICONS[i % CAT_ICONS.length]; return (<button key={k.id} onClick={() => setCatId(active ? null : k.id)} className="flex flex-col items-center gap-2" style={{ flexShrink: 0, width: 72 }}><div style={{ width: 60, height: 60, borderRadius: 18, background: active ? `linear-gradient(135deg,${g[0]},${g[1]})` : c.card, border: `1px solid ${active ? "transparent" : c.line}`, display: "flex", alignItems: "center", justifyContent: "center" }}><Ic size={24} color={active ? "#fff" : c.primary} /></div><span style={{ fontSize: 10.5, color: active ? c.primary : c.dim, fontWeight: 600, maxWidth: 70, textAlign: "center", lineHeight: 1.3, overflow: "hidden", textOverflow: "ellipsis", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>{k.name}</span></button>); })}
        </div>}
        {loadingShop ? (
          <div className="flex flex-col items-center justify-center gap-3 py-20"><Loader2 size={28} color={c.primary} style={{ animation: "spin 1s linear infinite" }} /><span style={{ fontSize: 14, color: c.dim }}>در حال دریافت محصولات…</span></div>
        ) : list.length === 0 ? (
          <div className="flex flex-col items-center justify-center gap-3 py-20"><ShoppingBag size={36} color={c.dim} /><span style={{ fontSize: 14, color: c.dim }}>محصولی یافت نشد</span></div>
        ) : (
        <div className="px-5 mt-5 flex flex-col gap-3">{list.map((p, i) => { const g = gradFor(i); const showPrice = p.type === "بازدیدی" ? money(p.pricePerK) : money(p.price); return (
          <Card key={p.id} onClick={() => push("product", { p, g })} style={{ padding: 14, display: "flex", gap: 14, alignItems: "center" }}>
            <div style={{ width: 64, height: 64, borderRadius: 16, flexShrink: 0, background: `linear-gradient(135deg,${g[0]},${g[1]})`, display: "flex", alignItems: "center", justifyContent: "center" }}><Tag size={26} color="#fff" /></div>
            <div className="flex-1 min-w-0"><div className="flex items-center gap-2"><div className="font-bold truncate" style={{ fontSize: 15, color: c.text }}>{p.name}</div>{p.tag && <span style={{ fontSize: 10, fontWeight: 700, color: c.accent, background: `${c.accent}22`, padding: "2px 7px", borderRadius: 6 }}>{p.tag}</span>}</div>
              <div style={{ fontSize: 12, color: c.dim, marginTop: 3 }}>{p.type === "بازدیدی" ? `هر ۱۰۰۰ ${p.unitName} · حداقل ${money(p.minK * 1000)}` : p.type}</div>
              <div className="font-bold mt-1.5" style={{ fontSize: 15, color: c.primary }}>{showPrice} <span style={{ fontSize: 11, color: c.dim }}>تومان{p.type === "بازدیدی" ? ` / ۱۰۰۰ ${p.unitName}` : ""}</span></div></div><ChevronLeft size={20} color={c.dim} />
          </Card>
        ); })}</div>
        )}
      </div>
    );
  };
  const Product = ({ p, g }) => {
    const grad = g || ["#7367f0","#8b5cf6"];
    const isView = p.type === "بازدیدی";
    // kAmount: میزان بر حسب «هزار بازدید». تعداد واقعی = kAmount × ۱۰۰۰
    const [kAmount, setKAmount] = useState(isView ? p.minK : 1);
    const total = isView ? Math.round(kAmount * p.pricePerK) : p.price * kAmount;
    const realViews = kAmount * 1000;
    const clampK = (v) => Math.min(p.maxK, Math.max(p.minK, v || p.minK));
    return (
      <div className="pb-40"><Header title="جزئیات خدمت" />
        <div className="px-5">
          <div style={{ height: 160, borderRadius: 24, background: `linear-gradient(135deg,${grad[0]},${grad[1]})`, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", overflow: "hidden" }}><div style={{ position: "absolute", inset: 0, opacity: .25, background: `repeating-linear-gradient(135deg, transparent, transparent 18px, #fff3 18px, #fff3 19px)` }} /><Tag size={56} color="#fff" /></div>
          <div className="mt-5 flex items-start justify-between"><div><div className="font-bold" style={{ fontSize: 21, color: c.text }}>{p.name}</div><div style={{ fontSize: 13, color: c.dim, marginTop: 4 }}>{p.catName || ""} · {p.type}</div></div>{p.tag && <Chip color={c.accent} bg={`${c.accent}22`} t={p.tag} />}</div>
          <p style={{ fontSize: 14, color: c.dim, lineHeight: 1.9, marginTop: 14 }}>{p.desc}</p>

          {isView ? (
            <Card style={{ padding: 18, marginTop: 16 }}>
              <div className="flex items-center justify-between mb-1"><span style={{ fontSize: 14, color: c.text, fontWeight: 700 }}>میزان {p.unitName}</span><span className="font-bold" style={{ fontSize: 18, color: c.primary }}>{money(realViews)}</span></div>
              <div style={{ fontSize: 11, color: c.dim, marginBottom: 10 }}>حداقل سفارش: {money(p.minK * 1000)} {p.unitName} · هر ۱۰۰۰ بازدید {money(p.pricePerK)} تومان</div>
              <input type="range" dir="ltr" min={p.minK} max={p.maxK} step={p.stepK} value={kAmount} onChange={(e) => setKAmount(+e.target.value)} style={{ width: "100%", accentColor: c.primary }} />
              <div dir="ltr" className="flex justify-between mt-1" style={{ fontSize: 11, color: c.dim }}><span>{money(p.minK * 1000)}</span><span>{money(p.maxK * 1000)}</span></div>
              <div className="flex items-center gap-2 mt-4">
                <button onClick={() => setKAmount(clampK(kAmount - p.stepK))} style={{ width: 44, height: 44, borderRadius: 12, background: c.bg2, border: `1px solid ${c.line}`, display: "flex", alignItems: "center", justifyContent: "center" }}><Minus size={18} color={c.text} /></button>
                <input type="number" value={realViews} onChange={(e) => { const views = +e.target.value || 0; setKAmount(clampK(Math.round(views / 1000))); }} style={{ flex: 1, textAlign: "center", background: c.bg2, border: `1px solid ${c.line}`, borderRadius: 12, padding: "12px", color: c.text, fontSize: 15, fontWeight: 700, outline: "none", fontFamily: "inherit" }} />
                <button onClick={() => setKAmount(clampK(kAmount + p.stepK))} style={{ width: 44, height: 44, borderRadius: 12, background: c.bg2, border: `1px solid ${c.line}`, display: "flex", alignItems: "center", justifyContent: "center" }}><Plus size={18} color={c.text} /></button>
              </div>
              <div className="flex gap-2 mt-3">{(() => {
                const span = p.maxK - p.minK;
                const raw = [0, 0.25, 0.5, 1].map((r) => p.minK + span * r);
                const snap = (v) => clampK(Math.round(v / p.stepK) * p.stepK);
                const vals = [...new Set(raw.map(snap))];
                return vals.map((val) => (<button key={val} onClick={() => setKAmount(val)} className="flex-1" style={{ padding: "8px 0", borderRadius: 10, fontSize: 11, fontWeight: 700, background: kAmount === val ? `${c.primary}1c` : c.bg2, color: kAmount === val ? c.primary : c.dim, border: `1px solid ${kAmount === val ? c.primary : c.line}` }}>{money(val * 1000)}</button>));
              })()}</div>
            </Card>
          ) : (
            <Card style={{ padding: 18, marginTop: 16 }}><div className="flex items-center justify-between"><span style={{ fontSize: 14, color: c.text, fontWeight: 700 }}>تعداد</span>
              <div className="flex items-center gap-3"><button onClick={() => setKAmount(Math.max(1, kAmount - 1))} style={{ width: 40, height: 40, borderRadius: 12, background: c.bg2, border: `1px solid ${c.line}`, display: "flex", alignItems: "center", justifyContent: "center" }}><Minus size={18} color={c.text} /></button><span className="font-bold" style={{ fontSize: 18, color: c.text, minWidth: 28, textAlign: "center" }}>{fa(kAmount)}</span><button onClick={() => setKAmount(kAmount + 1)} style={{ width: 40, height: 40, borderRadius: 12, background: c.bg2, border: `1px solid ${c.line}`, display: "flex", alignItems: "center", justifyContent: "center" }}><Plus size={18} color={c.text} /></button></div>

    return (
    <div className="pb-10"><Header title="اعلان‌ها" right={<button onClick={readAll} style={{ fontSize: 12, color: c.primary, fontWeight: 700, background: "none", border: "none", whiteSpace: "nowrap" }}>خواندن همه</button>} />
      <div className="px-5 flex flex-col gap-2">{list === null ? (<div className="flex justify-center py-10"><Loader2 size={24} color={c.primary} style={{ animation: "spin 1s linear infinite" }} /></div>) : list.length === 0 ? (<div style={{ textAlign: "center", color: c.dim, fontSize: 14, padding: 30 }}>اعلانی نیست</div>) : list.map((n) => (<Card key={n.id} style={{ padding: 15, display: "flex", gap: 12, alignItems: "center", borderColor: !n.is_read ? `${c.primary}45` : c.line }}><div style={{ width: 42, height: 42, borderRadius: 12, background: `${c.primary}1c`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Bell size={20} color={c.primary} /></div><div className="flex-1"><div className="font-bold" style={{ fontSize: 14, color: c.text }}>{n.title}</div>{n.message && <div style={{ fontSize: 12, color: c.dim, marginTop: 3 }}>{n.message}</div>}<div style={{ fontSize: 11, color: c.dim, marginTop: 3 }}>{n.created_at}</div></div>{!n.is_read && <div style={{ width: 9, height: 9, borderRadius: 99, background: c.primary }} />}</Card>))}</div>
    </div>
    );
  };

  /* routing */
  const renderBody = () => {
    if (top) { const P = top.params; const M = {
      product: <Product p={P.p} g={P.g} />, checkout: <Checkout />, topup: <TopUp />, wallet: <WalletScreen />,
      orders: <Orders />, order: <OrderDetail o={P.o} />, invoices: <Invoices />, invoice: <InvoiceDetail id={P.id} />, payments: <Payments />,
      affiliate: <Affiliate />, instagram: <InstagramScreen />, contents: <Contents />, activity: <ActivityLog />,
      profile: <ProfileEdit />, security: <Security />, changepw: <ChangePassword />, twofa: <TwoFASetup />, disable2fa: <Disable2FA />, devices: <Devices />,
      campaign: <CampaignDetail cp={P.cp} cpId={P.cpId} />, wizard: <Wizard />, tickets: <Tickets />, newticket: <NewTicket />,
      ticket: <TicketDetail id={P.id} />, notifs: <Notifs />,
    }; return M[top.name] || null; }
    return { home: <HomeScreen />, shop: <Shop />, campaigns: <Campaigns />, ai: <AI />, account: <Account /> }[tab];
  };
  const NAV = [{ k: "home", i: Home, t: "خانه" }, { k: "shop", i: ShoppingBag, t: "خدمات" }, { k: "campaigns", i: Rocket, t: "تبلیغ", fab: true }, { k: "ai", i: Sparkles, t: "هوش" }, { k: "account", i: User, t: "حساب" }];
  const noScroll = (top && top.name === "ticket") || (!top && tab === "ai");
  const showNav = screen === "app" && !top && tab !== "ai";
  const aiNav = screen === "app" && !top && tab === "ai";

  return (
    <div dir="rtl" style={{ minHeight: "100vh", background: dark ? "#04060C" : "#D7DAEA", display: "flex", alignItems: "center", justifyContent: "center", padding: 0, fontFamily: "Vazirmatn, system-ui, sans-serif" }}>
      <div id="frame" style={{ width: 430, maxWidth: "100%", height: "100vh", maxHeight: "100vh", background: c.bg, overflow: "hidden", position: "relative", boxShadow: "0 0 60px -20px rgba(0,0,0,.5)" }}>
        <div key={top ? top.name : tab} style={{ position: "absolute", top: "env(safe-area-inset-top, 0px)", bottom: 0, left: 0, right: 0, overflowY: noScroll ? "hidden" : "auto", WebkitOverflowScrolling: "touch", animation: "slideIn .28s both" }}>
          {screen === "splash" && <Splash />}
          {screen === "login" && <Login />}
          {screen === "app" && renderBody()}
        </div>
        {(showNav || aiNav) && (
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 76, background: dark ? `${c.bg2}f5` : `${c.card}f8`, borderTop: `1px solid ${c.line}`, backdropFilter: "blur(12px)", display: "flex", alignItems: "center", justifyContent: "space-around", paddingBottom: 8, zIndex: 25 }}>
            {NAV.map((n) => { const active = tab === n.k;
              if (n.fab) return (<button key={n.k} onClick={() => goTab(n.k)} style={{ marginTop: -26, background: "none", border: "none" }}><div style={{ width: 54, height: 54, borderRadius: 19, background: GRAD, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: `0 10px 24px -8px ${c.glow}` }}><n.i size={25} color="#fff" /></div></button>);
              return (<button key={n.k} onClick={() => goTab(n.k)} className="flex flex-col items-center gap-1" style={{ width: 56, background: "none", border: "none" }}><n.i size={22} color={active ? c.primary : c.dim} /><span style={{ fontSize: 10, fontWeight: 700, color: active ? c.primary : c.dim }}>{n.t}</span></button>);
            })}
          </div>
        )}
        {toast && (<div style={{ position: "absolute", bottom: 96, left: 20, right: 20, background: c.text, color: c.bg, padding: "13px 18px", borderRadius: 16, fontSize: 14, fontWeight: 700, textAlign: "center", zIndex: 50, animation: "fadeUp .3s both", boxShadow: "0 12px 30px -10px rgba(0,0,0,.5)" }}>{toast}</div>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

document.getElementById("loader").style.display="none";
</script>
</body>
</html>
